name: Check Phoenix7 static build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify static build files
        run: |
          test -f index.html
          grep -q "Phoenix7" index.html
          grep -q "2.0" index.html
          echo "Phoenix7 static build exists and is ready for manual GitHub Pages setup."

      - name: Print project tree
        run: |
          find . -maxdepth 3 -type f | sort
